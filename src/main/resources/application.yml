spring:
  application:
    name: cloud
  profiles:
    active: local
  cloud:
    aws:
      region:
        static: ap-northeast-2
      s3:
        bucket: ${S3_BUCKET_NAME:}
  servlet:
    multipart:
      max-file-size: 10MB

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info
