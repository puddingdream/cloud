name: CI-CD Deploy

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build and Test
        run: ./gradlew clean test bootJar

      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/arm64,linux/amd64
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/${{ vars.ECR_REPOSITORY }}:latest
            ${{ steps.login-ecr.outputs.registry }}/${{ vars.ECR_REPOSITORY }}:${{ github.sha }}

      - name: Start ASG Instance Refresh (Rolling)
        run: |
          STATUS=$(aws autoscaling describe-instance-refreshes \
            --auto-scaling-group-name "${{ vars.ASG_NAME }}" \
            --query "sort_by(InstanceRefreshes,&StartTime)[-1].Status" \
            --output text)

          if [ "$STATUS" = "Pending" ] || [ "$STATUS" = "InProgress" ]; then
            echo "Instance refresh is already running. Skip starting a new refresh."
            exit 0
          fi

          aws autoscaling start-instance-refresh \
            --auto-scaling-group-name "${{ vars.ASG_NAME }}" \
            --preferences '{"MinHealthyPercentage":50,"InstanceWarmup":120}'
